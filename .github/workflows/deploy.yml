name: Deploy to GitHub Pages

# Builds the Vite site and publishes dist/public to GitHub Pages on every push
# to main. No server required — this is a fully static deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege tokens the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version comes from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # SPA fallback: GitHub Pages serves 404.html for unknown paths, so make it
      # a copy of index.html to keep client-side routing / deep links working.
      - name: Add SPA 404 fallback
        run: cp dist/public/index.html dist/public/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
